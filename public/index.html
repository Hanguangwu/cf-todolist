<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%234a90e2'/%3E%3Cpath d='M30 55 l15 15 l30 -30' stroke='%23ffffff' stroke-width='12' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
    <div class="container">
        <div id="login-screen">
            <div class="login-logo">
                <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="5" y="5" width="90" height="90" rx="20" fill="url(#gradient)"/>
                    <path d="M30 55 l15 15 l30 -30" stroke="white" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
                    <defs>
                        <linearGradient id="gradient" x1="0" y1="0" x2="100" y2="100">
                            <stop offset="0%" stop-color="#4a90e2"/>
                            <stop offset="100%" stop-color="#357abd"/>
                        </linearGradient>
                    </defs>
                </svg>
            </div>
            <h1>我的待办清单</h1>
            <p class="login-desc">输入密钥以继续</p>
            <div class="login-form">
                <div class="input-group">
                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                    <input type="password" id="secret-key-input" placeholder="请输入密钥">
                </div>
                <button id="login-btn">登录</button>
                <p id="login-error" class="login-error"></p>
            </div>
        </div>

        <div id="todo-app" class="hidden">
            <header>
                <div class="user-info">
                    <span id="user-email-display"></span>
                    <button id="logout-btn">退出</button>
                </div>
                <h1>我的待办事项</h1>

                <nav class="nav-tabs">
                    <button class="nav-tab active" data-view="daily">📅 每日</button>
                    <button class="nav-tab" data-view="weekly">📆 每周</button>
                    <button class="nav-tab" data-view="monthly">📋 每月</button>
                    <button class="nav-tab" data-view="ongoing">🔄 进行中</button>
                    <button class="nav-tab" data-view="analytics">📊 分析</button>
                </nav>
            </header>

            <main class="view-container">

                <!-- ===== Daily View ===== -->
                <section id="view-daily" class="view-panel active">
                    <div class="view-controls">
                        <button class="ctrl-btn" id="daily-prev">‹</button>
                        <span class="picker-label-wrapper">
                            <span id="daily-date-label"></span>
                            <input type="date" id="daily-date-picker" class="picker-overlay">
                        </span>
                        <button class="ctrl-btn" id="daily-next">›</button>
                        <button class="ctrl-btn today-btn" id="daily-today">今天</button>
                    </div>
                    <form id="daily-form" class="add-form">
                        <input type="text" id="daily-input" class="add-input" placeholder="今日需要做什么？" autocomplete="off">
                        <button type="submit" class="add-btn">添加</button>
                    </form>
                    <div class="progress-bar-container">
                        <div class="progress-bar-fill" id="daily-progress-fill"></div>
                        <span class="progress-label" id="daily-progress-label">0%</span>
                    </div>
                    <ul id="daily-list" class="todo-list"></ul>
                    <p class="empty-hint" id="daily-empty">今日暂无任务</p>
                </section>

                <!-- ===== Weekly View ===== -->
                <section id="view-weekly" class="view-panel">
                    <div class="view-controls">
                        <button class="ctrl-btn" id="weekly-prev">‹</button>
                        <span id="weekly-date-label" class="clickable-label"></span>
                        <input type="number" id="weekly-week-edit" class="inline-edit-input" min="1" max="53" placeholder="周数">
                        <button class="ctrl-btn" id="weekly-next">›</button>
                        <button class="ctrl-btn today-btn" id="weekly-current">本周</button>
                    </div>
                    <form id="weekly-form" class="add-form">
                        <input type="text" id="weekly-input" class="add-input" placeholder="本周需要做什么？" autocomplete="off">
                        <button type="submit" class="add-btn">添加</button>
                    </form>
                    <div class="progress-bar-container">
                        <div class="progress-bar-fill" id="weekly-progress-fill"></div>
                        <span class="progress-label" id="weekly-progress-label">0%</span>
                    </div>
                    <ul id="weekly-list" class="todo-list"></ul>
                    <p class="empty-hint" id="weekly-empty">本周暂无任务</p>
                </section>

                <!-- ===== Monthly View ===== -->
                <section id="view-monthly" class="view-panel">
                    <div class="view-controls">
                        <button class="ctrl-btn" id="monthly-prev">‹</button>
                        <span class="picker-label-wrapper">
                            <span id="monthly-date-label"></span>
                            <input type="month" id="monthly-month-picker" class="picker-overlay">
                        </span>
                        <button class="ctrl-btn" id="monthly-next">›</button>
                        <button class="ctrl-btn today-btn" id="monthly-current">本月</button>
                    </div>
                    <form id="monthly-form" class="add-form">
                        <input type="text" id="monthly-input" class="add-input" placeholder="本月需要做什么？" autocomplete="off">
                        <button type="submit" class="add-btn">添加</button>
                    </form>
                    <div class="progress-bar-container">
                        <div class="progress-bar-fill" id="monthly-progress-fill"></div>
                        <span class="progress-label" id="monthly-progress-label">0%</span>
                    </div>
                    <ul id="monthly-list" class="todo-list"></ul>
                    <p class="empty-hint" id="monthly-empty">本月暂无任务</p>
                </section>

                <!-- ===== Ongoing View ===== -->
                <section id="view-ongoing" class="view-panel">
                    <div class="view-controls">
                        <button class="ctrl-btn" id="ongoing-week-prev">‹</button>
                        <span id="ongoing-week-label"></span>
                        <button class="ctrl-btn" id="ongoing-week-next">›</button>
                        <button class="ctrl-btn today-btn" id="ongoing-this-week">本周</button>
                        <span class="ctrl-divider">|</span>
                        <button class="ctrl-btn" id="ongoing-month-prev">‹</button>
                        <span id="ongoing-month-label"></span>
                        <button class="ctrl-btn" id="ongoing-month-next">›</button>
                        <button class="ctrl-btn today-btn" id="ongoing-this-month">本月</button>
                    </div>
                    <div id="ongoing-content">
                        <div class="ongoing-section">
                            <div class="ongoing-section-header">
                                <span class="ongoing-section-icon">📅</span>
                                <span class="ongoing-section-title">本周待办</span>
                                <span id="ongoing-week-range" class="ongoing-section-range"></span>
                            </div>
                            <ul id="ongoing-week-list" class="todo-list"></ul>
                            <p class="empty-hint" id="ongoing-week-empty">本周暂无待办</p>
                        </div>
                        <div class="ongoing-section">
                            <div class="ongoing-section-header">
                                <span class="ongoing-section-icon">📋</span>
                                <span class="ongoing-section-title">本月待办</span>
                                <span id="ongoing-month-range" class="ongoing-section-range"></span>
                            </div>
                            <ul id="ongoing-month-list" class="todo-list"></ul>
                            <p class="empty-hint" id="ongoing-month-empty">本月暂无待办</p>
                        </div>
                    </div>
                </section>

                <!-- ===== Analytics View ===== -->
                <section id="view-analytics" class="view-panel">
                    <div class="view-controls">
                        <button class="ctrl-btn" id="analytics-year-prev">‹</button>
                        <span id="analytics-year-label"></span>
                        <button class="ctrl-btn" id="analytics-year-next">›</button>
                    </div>
                    <div id="analytics-content">
                        <div class="stats-cards" id="analytics-summary"></div>
                        <div class="charts-grid">
                            <div class="chart-card">
                                <h3>月度趋势</h3>
                                <canvas id="trend-chart"></canvas>
                            </div>
                            <div class="chart-card">
                                <h3>任务类型分布</h3>
                                <canvas id="type-chart"></canvas>
                            </div>
                        </div>
                        <div class="streak-display" id="analytics-streak"></div>
                        <div class="weekly-ranking" id="analytics-weekly-rank"></div>
                    </div>
                </section>

            </main>

            <footer>
                <p>由 <a href="https://www.cloudflare.com/" target="_blank">Cloudflare</a> D1、KV、Pages强力驱动</p>
            </footer>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
